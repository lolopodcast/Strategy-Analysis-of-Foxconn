<script>
  function showCopyrightMsg() {
    let modal = document.getElementById('copyright-msg-modal');
    if (!modal) {
      modal = document.createElement('div');
      modal.id = 'copyright-msg-modal';
      modal.className = 'copyright-modal';
      modal.innerText = 'Intellectual Property of Prof. Shihmin Lo';
      document.body.appendChild(modal);
    }
    modal.style.animation = 'none';
    modal.offsetHeight; 
    modal.style.animation = 'popIn 0.3s ease-out forwards';
    modal.style.opacity = '1';
    
    if(window.copyrightTimer) clearTimeout(window.copyrightTimer);
    window.copyrightTimer = setTimeout(() => {
      let currentModal = document.getElementById('copyright-msg-modal');
      if(currentModal) {
        currentModal.style.animation = 'none'; 
        currentModal.style.opacity = '0';      
        setTimeout(() => { if (currentModal.parentNode) currentModal.parentNode.removeChild(currentModal); }, 300);
      }
    }, 2000);
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.addEventListener('dragstart', (e) => {
      if (e.target.tagName.toLowerCase() === 'img' || e.target.tagName.toLowerCase() === 'svg') e.preventDefault();
    });
    document.addEventListener('contextmenu', (e) => {
      const selection = window.getSelection().toString();
      if (selection.length === 0 || e.target.tagName.toLowerCase() === 'img' || e.target.tagName.toLowerCase() === 'svg') {
        e.preventDefault(); showCopyrightMsg();
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'F12') { e.preventDefault(); showCopyrightMsg(); }
      if (e.ctrlKey && e.key.toLowerCase() === 'u') { e.preventDefault(); showCopyrightMsg(); }
      if (e.ctrlKey && e.shiftKey && ['i', 'j', 'c'].includes(e.key.toLowerCase())) { e.preventDefault(); showCopyrightMsg(); }
    });
  });

m1_p1:"鴻海的成功基礎建立在經典的「成本領導策略 (Cost Leadership)」。作為電子製造服務商 (EMS)，鴻海並不擁有名目上的終端消費品牌（如 Apple、HP），而是專注於價值鏈中段的製造與組裝環節。透過承接全球各大科技巨頭的訂單，鴻海達成了單一品牌廠無法企及的極致「規模經濟 (Economies of Scale)」。",
m1_p2:"「在代工產業，規模就是護城河。當你具備一天組裝 50 萬支 iPhone 的產能與良率時，競爭對手根本無法在成本上與你匹敵。」",
m1_p3:"龐大的規模帶來了雙重優勢：(1) 對上游供應商產生極強的「議價能力 (Bargaining Power)」，能以最低價格取得原物料；(2) 龐大的固定成本（如自動化設備、模具開發）能被海量的生產單位攤提，顯著壓低單位成本。這使得鴻海在代工市場築起了極高的進入障礙。",
m1_p4:"此外，鴻海將「經驗曲線效應 (Experience Curve)」發揮到極致。透過不斷累積的生產量，其產線工程師與管理系統能持續優化流程、減少瑕疵並提升勞動生產力（即「做中學」 Learning by doing）。",

  {q:"鴻海在 Apple 供應鏈中主要扮演何種角色？",opts:["掌握核心專利的研發者","負責晶片設計的無晶圓廠","專注於終端硬體組裝與製造的 EMS 廠","負責全球終端行銷的品牌商"],ans:2,exp:"鴻海 (Foxconn) 是全球最大的電子製造服務 (EMS) 廠，主要負責將各方零組件組裝成最終產品。"},
  {q:"鴻海能夠壓低原物料採購價格，主要是因為波特五力模型中的哪一項優勢？",opts:["潛在進入者的威脅低","買方（鴻海對供應商）的議價能力極強","替代品的威脅低","現有競爭者的競爭弱"],ans:1,exp:"由於鴻海採購量極大，佔據了上游供應商營收的龐大比例，因此對供應商擁有絕對的議價能力。"},
  {q:"「經驗曲線」(Experience Curve) 對鴻海的意義是什麼？",opts:["員工年資越老，薪水越高","隨著累積產量的增加，透過流程優化與熟練度提升，單位生產成本會持續下降","只依賴最先進的機器，不需要員工經驗","經驗會導致組織僵化"],ans:1,exp:"代工廠透過海量生產累積了無可匹敵的除錯與優化經驗，這是新進競爭者難以在短期內跨越的門檻。"},
  {q:"根據「微笑曲線」(Smiling Curve) 理論，鴻海傳統的代工業務處於曲線的哪一個位置？",opts:["左端（研發設計，附加價值高）","右端（品牌行銷，附加價值高）","底部（製造組裝，附加價值最低）","頂端（附加價值最高）"],ans:2,exp:"微笑曲線指出，價值鏈兩端的研發與行銷利潤最豐厚，而中段的製造組裝利潤微薄，這也是鴻海急欲轉型的原因。"},
  {q:"鴻海擁有百萬名員工的高效管理體系，這種競爭優勢具有何種特性使其難以被對手模仿？",opts:["專利保護","因果模糊性 (Causal Ambiguity) 與社會複雜性","政府補貼","完全自動化"],ans:1,exp:"管理百萬大軍涉及極其複雜的組織文化、激勵機制與隱性知識，對手很難搞清楚其成功運作的真實因果關係，因此極難複製。"}
],

m2_nav:"2. 垂直整合",m2_title:"垂直整合與 eCMMS 模式",
m2_p1:"為了在微薄的代工利潤中擠出更多價值，鴻海並非單純地只做「最終組裝」。郭台銘創立了獨步全球的「eCMMS」模式（E-enabled Components, Modules, Moves and Services）。",
m2_p2:"eCMMS 的核心本質是極致的「向後垂直整合 (Backward Vertical Integration)」。鴻海不僅幫客戶組裝手機，它還自己生產手機殼、連接器、機構件、甚至印刷電路板 (PCB)。",
m2_p3:"從「交易成本經濟學 (TCE)」的角度來看，鴻海將這些原本需要向外部供應商採購的零組件「內部化 (Make)」。這樣做有三大好處：(1) 消除與外部供應商的談判、議價與資訊不對稱等交易成本；(2) 完全掌握關鍵零組件的交期與品質，實現「一站式購足」的極速反應；(3) 將零組件的利潤截留在集團內部，墊高整體的獲利空間。",
m2_p4:"然而，高度的垂直整合也帶來了「彈性喪失」的風險。當科技迭代速度加快（如金屬機殼轉向玻璃機殼），被綁死在舊有龐大產線資產上的垂直整合企業，轉型速度往往不如將非核心業務外包的虛擬企業 (Virtual Corporation)。",
m2_cards:[
  {title:"eCMMS 模式",desc:"從早期的 OEM（單純代工）進化，鴻海將零組件 (Components)、模組 (Modules) 與組裝/服務整合，為客戶提供從設計端到物流端的高效垂直整合解決方案。"},
  {title:"向後垂直整合的綜效",desc:"Apple 只需對接鴻海一個窗口，鴻海內部自動協調機殼、連接器與組裝的進度。這大幅降低了 Apple 尋找與協調數十家供應商的「市場交易成本」。"},
  {title:"套牢風險 (Hold-up Risk)",desc:"由於代工廠必須為 Apple 的特殊規格投入大量「專屬性資產」(如專用模具、自動化機台)，若 Apple 抽單或大砍代工費，鴻海極易面臨被套牢與利潤剝削的風險。"},
  {title:"內部化的代價",desc:"當企業內部化過多環節時，會導致組織龐大臃腫，內部供應部門失去外部市場競爭的「高強度誘因」，可能引發效率低下的官僚成本。"}
],
m2_terms:[
  {front:"Backward Integration\n向後垂直整合",back:"企業將價值鏈向原物料或零組件等上游方向延伸，將供應商的角色納入公司內部。"},
  {front:"Transaction Cost Economics\n交易成本經濟學",back:"解釋企業邊界的理論。當市場交易的摩擦成本大於內部行政協調的成本時，企業便會選擇將該活動內部化 (垂直整合)。"},
  {front:"Asset Specificity\n資產專屬性",back:"為了某特定客戶或交易而投入的資產（如 iPhone 專用生產線），難以轉移至其他用途，是產生套牢風險的根源。"}
],
m2_q:[
  {q:"鴻海的 eCMMS 模式，在策略管理學上最精準的分類為何？",opts:["非相關多角化","高度的向前垂直整合","高度的向後垂直整合與一站式服務","完全的虛擬企業模式"],ans:2,exp:"鴻海從組裝端向後延伸，自行生產連接器、機殼等上游零組件，這是典型的向後垂直整合。"},
  {q:"根據「交易成本經濟學」，Apple 願意讓鴻海統包大部分零組件與組裝的原因是？",opts:["因為鴻海的行政成本最高","為了大幅降低 Apple 自行在市場上尋找、談判與協調眾多零組件供應商的「交易成本」","因為 Apple 想被套牢","為了增加碳排放"],ans:1,exp:"鴻海的一站式服務將市場上的交易摩擦「內部化」處理，替品牌廠省下了龐大的協調與管理成本。"},
  {q:"高度依賴單一大客戶（如 Apple 佔鴻海營收逾 50%），且為其投入大量專用生產線。這會讓鴻海面臨何種風險？",opts:["規模經濟風險","套牢問題 (Hold-up Problem) 帶來的議價劣勢","匯率風險","品牌延伸風險"],ans:1,exp:"投入高度「專屬性資產」後，若客戶威脅轉單，代工廠為避免資產閒置只能被迫接受降價，這就是被套牢勒索的風險。"},
  {q:"垂直整合為鴻海帶來的好處「不」包含下列何者？",opts:["掌握關鍵零組件交期，提升回應速度","將零組件利潤留在集團內部","享受絕對的策略彈性，隨時能無縫更換新技術供應商","降低被外部供應商卡脖子的風險"],ans:2,exp:"高度垂直整合會將資金鎖死在既有設備上，反而喪失了「策略彈性」。一旦技術更迭，船大難掉頭。"},
  {q:"相較於將製造完全外包的「虛擬企業」(如 Apple 自身)，鴻海這種高度垂直整合的實體工廠模式，面臨的最大劣勢是？",opts:["沒有品牌知名度","龐大的固定資產投資負擔，在景氣下行時容易產生巨額折舊與虧損","無法進行研發","沒有員工"],ans:1,exp:"虛擬企業將產能風險轉嫁給代工廠。鴻海作為重資產的代工廠，必須時刻維持極高的產能利用率才能獲利。"}
],

m3_nav:"3. 全球佈局",m3_title:"跨國擴張與全球佈局",
m3_p1:"鴻海的擴張史就是一部全球供應鏈的演化史。早期，鴻海在中國大陸（如深圳、鄭州）建立了龐大的生產基地，這屬於標準的「尋求效率 (Efficiency-seeking)」跨國動機——利用中國豐沛且廉價的勞動力與土地資源，結合台幹的管理技術，創造極致的成本優勢。",
m3_p2:"然而，隨著地緣政治摩擦（中美貿易戰）以及中國勞動力成本的上升，全球供應鏈正在從「長鏈」走向「短鏈」與「碎鏈」。品牌大廠要求代工廠必須具備「China Plus One」（中國以外備用產能）的能力。",
m3_p3:"因此，鴻海加速將產能向印度、越南、墨西哥與美國轉移。在 Bartlett & Ghoshal 的「I-R 架構」(Integration-Responsiveness Framework) 中，代工產業傳統上採取高度的「全球化策略 (Global Strategy)」——追求極致的全球整合與規模經濟。但現在，為了回應各國政府對「在地製造 (Make in India, US)」的法規要求與關稅壁壘，鴻海被迫提升「在地回應 (Local Responsiveness)」。",
m3_p4:"管理跨國工廠面臨極大的「CAGE 距離」挑戰。在印度與美國建廠，鴻海面臨巨大的文化距離（勞工價值觀與工會問題）、行政距離（複雜的法規）與經濟距離（缺乏成熟的周邊零組件聚落），這些「外來者劣勢」大幅考驗著鴻海的全球運籌能力。",
m3_cards:[
  {title:"尋求效率 (Efficiency-seeking)",desc:"鴻海早期的國際化動機。將勞力密集的組裝環節，配置在具備「區位優勢」（低工資、人口紅利）的國家，以最大化全球價值鏈的成本效益。"},
  {title:"China Plus One 策略",desc:"因應中美地緣政治風險與供應鏈斷鏈危機，跨國企業不再將雞蛋放在中國這同一個籃子裡，強制要求代工廠在東南亞或印度建立替代產能。"},
  {title:"CAGE 距離的摩擦",desc:"鴻海在美國威斯康辛州建廠的波折，完美體現了忽略「行政與經濟距離」的代價——當地缺乏亞洲那種高度集中的零組件供應鏈與願意配合彈性加班的技術勞工。"},
  {title:"從全球化走向跨國型",desc:"過去只需追求「全球成本最低」（高整合）；現在必須兼顧「在地生產與法規適應」（高回應），對跨國管理矩陣的複雜度要求急遽上升。"}
],
m3_terms:[
  {front:"Efficiency-seeking\n尋求效率",back:"跨國企業對外投資的動機之一，旨在尋找成本最低或生產力最高的區位來配置價值鏈活動。"},
  {front:"I-R Framework\n整合-回應架構",back:"分析跨國企業如何在「全球整合（降成本）」與「在地回應（適應各國差異）」間取得平衡的模型。"},
  {front:"Liability of Foreignness\n外來者劣勢",back:"企業在海外經營時，因不熟悉當地文化、法規與缺乏政商網絡，所產生高於本土企業的額外營運成本。"}
],
m3_q:[
  {q:"鴻海早期大規模在中國鄭州與深圳建廠，最主要的國際化動機為何？",opts:["尋求市場 (賣手機給中國人)","尋求效率 (利用低廉勞力與土地降低製造成本)","尋求策略性資產 (併購中國高科技公司)","尋求自然資源 (開採石油)"],ans:1,exp:"代工廠利潤微薄，早期赴陸建廠完全是為了獲取低成本的要素區位優勢，屬於尋求效率的動機。"},
  {q:"近年來 Apple 要求鴻海將部分 iPhone 產能移往印度與越南，這反映了跨國策略中的何種壓力？",opts:["追求更極致的全球規模經濟","回應地緣政治風險、關稅與地主國法規的「在地回應」(Local Responsiveness) 壓力","為了取得當地的先進研發技術","為了降低運輸成本"],ans:1,exp:"在地緣政治下，供應鏈必須具備韌性 (Resilience)，迫使代工廠放棄單一最大規模生產基地的成本極致，轉向在地化分散風險。"},
  {q:"鴻海在美國威州設廠進度不如預期，主要遭遇的「外來者劣勢」(Liability of Foreignness) 可以用 Ghemawat 的哪個框架解釋？",opts:["波特五力模型","BCG 矩陣","CAGE 距離架構 (特別是行政與經濟/基礎設施距離)","微笑曲線"],ans:2,exp:"美國當地缺乏完整的電子零組件聚落（經濟/基礎設施距離）且面臨不同的勞工法規與工會文化（行政/文化距離），導致複製亞洲模式失敗。"},
  {q:"在傳統的「I-R 整合-回應矩陣」中，像電子代工這種「全球需求高度一致，且價格競爭極度激烈」的產業，通常採取何種策略？",opts:["多國本土化策略 (Multidomestic)","國際策略 (International)","全球化策略 (Global Strategy，追求極致規模與標準化)","套利策略"],ans:2,exp:"代工產業的本質是高全球整合需求（壓低成本）與低在地回應需求（代工規格由品牌廠全球統一制定），因此是標準的全球化策略。"},
  {q:"「China Plus One」策略的興起，最直接打擊了過去企業深信的哪一種優勢？",opts:["範疇經濟","差異化優勢","過度集中單一區位所帶來的極致「規模經濟與群聚效應」","品牌價值"],ans:2,exp:"為了分散風險，企業被迫將原本集中在一個巨型工廠的產能打散至多國，這必然會犧牲掉一部分的規模經濟效益。"}
],

m4_nav:"4. 併購策略",m4_title:"併購策略：夏普案與策略性資產",
m4_p1:"當企業無法依靠內部有機成長 (Organic Growth) 突破瓶頸時，併購 (M&A) 成為獲取關鍵資源最快的途徑。面對代工毛利不斷被壓縮（微笑曲線底部的宿命），鴻海選擇透過跨國併購來「尋求策略性資產 (Strategic Asset-seeking)」。",
m4_p2:"2016 年，鴻海以約 3,888 億日圓收購了日本面板百年老店夏普 (Sharp)。這是一次經典的「互補性資源」結合。鴻海擁有極致的製造效率、雄厚的資本與龐大的蘋果訂單通路；夏普則擁有頂尖的 IGZO 面板技術、豐富的專利庫以及具備全球知名度的消費性品牌（無形資產）。",
m4_p3:"透過併購夏普，鴻海意圖產生強大的「綜效 (Synergy)」：(1) 垂直整合綜效：將夏普的高階面板技術納入鴻海的零組件供應鏈，提升對 Apple 的關鍵零組件自製率與毛利；(2) 範疇經濟：利用鴻海的製造能力降低夏普家電的成本，並藉助夏普品牌，讓鴻海首度跨出代工紅海，觸及微笑曲線右端的「品牌與行銷」。",
m4_p4:"然而，跨國併購的「併購後整合 (PMI)」是極大挑戰。台式強調「速度與成本控制」的霸氣代工文化，與日式強調「嚴謹、匠人精神」的百年企業文化產生了劇烈的文化衝突。鴻海最終採取了介於「共生 (Symbiosis)」與「吸收」之間的整合策略，派駐郭台銘的心腹戴正吳進行鐵腕改造，成功讓夏普轉虧為盈，但也面臨後續面板市場不景氣的挑戰。",
m4_cards:[
  {title:"尋求策略性資產",desc:"鴻海併購夏普並非為了擴充組裝產能，而是為了取得夏普的高階面板專利技術與百年品牌聲譽，以強化自身在價值鏈上的議價能力。"},
  {title:"跨越微笑曲線",desc:"擁有 Sharp 品牌，讓鴻海具備了直接面對終端消費者的武器，試圖擺脫純代工廠（無名英雄）毛利微薄的宿命，賺取品牌溢價。"},
  {title:"併購的文化衝突 (PMI)",desc:"M&A 失敗的主因通常不是財務算錯，而是文化不相容。台商的極速應變文化與日商的沉穩終身僱用制，在整合初期經歷了巨大的摩擦與陣痛。"},
  {title:"贏家的詛咒風險",desc:"鴻海當年與日本官民基金 (INCJ) 激烈競標夏普，雖然最終勝出，但也承擔了夏普龐大的潛藏債務，面臨支付過高溢價的風險。"}
],
m4_terms:[
  {front:"Strategic Asset-seeking\n尋求策略性資產",back:"併購動機之一。為了快速獲取自身缺乏的關鍵技術、專利、品牌或組織能力，而非單純追求產能擴張。"},
  {front:"Synergy\n綜效",back:"併購後兩家公司結合所產生的價值，大於兩者獨立運作的價值總和。鴻海期望夏普技術+鴻海製造=1+1>2。"},
  {front:"Post-Merger Integration\n併購後整合 (PMI)",back:"併購合約簽署後，將兩家公司的營運、系統、人員與文化實際融合以實現預期綜效的關鍵過程。"}
],
m4_q:[
  {q:"鴻海併購日本夏普 (Sharp)，在國際化動機上最符合哪一項？",opts:["尋求廉價勞工 (尋求效率)","尋求龐大的日本市場","尋求策略性資產 (獲取頂尖面板技術與品牌 IP)","為了逃避台灣稅負"],ans:2,exp:"夏普擁有 IGZO 面板專利與百年品牌，這是鴻海缺乏且無法在短期內自行發展出的關鍵策略性資產。"},
  {q:"鴻海將夏普的高階面板導入自家組裝的 iPhone 或電視中，這期望達成哪一種併購綜效？",opts:["水平規模經濟綜效","非相關多角化綜效","向後垂直整合綜效（掌握上游關鍵零組件，提升整體毛利）","金融套利綜效"],ans:2,exp:"面板是電子產品中成本極高的零組件，掌握自有的面板技術能讓鴻海在價值鏈中截留更多利潤，屬於垂直整合綜效。"},
  {q:"在「微笑曲線」的框架下，獲得夏普的「品牌」對鴻海有何策略意義？",opts:["讓鴻海的組裝能力退步","幫助鴻海從利潤微薄的曲線底部（代工），向利潤豐厚的曲線右端（品牌行銷）延伸","增加鴻海在中國的工廠數量","完全沒有意義"],ans:1,exp:"品牌能賺取溢價 (Premium)。擁有夏普品牌讓鴻海不再只是隱身幕後的代工廠，而能直接攫取終端市場的價值。"},
  {q:"鴻海與日本夏普的併購案中，最大的非財務挑戰 (Non-financial Challenge) 通常是什麼？",opts:["雙方距離太遠","嚴重不相容的企業文化衝突 (台式的霸氣極速 vs. 日式的嚴謹穩重)","語言完全無法溝通","政府強烈反對"],ans:1,exp:"併購後整合 (PMI) 的失敗高達 70% 歸因於文化衝突。不同文化導致信任崩潰與核心人才流失，是跨國併購最致命的陷阱。"},
  {q:"在競標夏普的過程中，鴻海曾面臨「贏家的詛咒」(Winner's Curse) 的疑慮。這指的是什麼風險？",opts:["贏了面子但輸了比賽","為了擊敗其他競標者（如 INCJ），鴻海可能支付了過高的溢價，導致併購成本大於所創造的綜效，最終毀滅股東價值","得標者會遭到神明詛咒","得標後被勒令停業"],ans:1,exp:"在激烈的競標中，贏家往往是過度樂觀、出價過高的人。若支付的溢價超過 1+1 大於 2 的那部分價值，這筆交易實質上是虧損的。"}
],

m5_nav:"5. 雙元組織與 MIH",m5_title:"轉型與雙元組織：MIH 平台策略",
m5_p1:"面對傳統消費性電子（智慧型手機、PC）市場的飽和與成長停滯，鴻海必須尋找下一個兆元級的金牛產業。他們將目光鎖定在電動車 (EV)。然而，汽車產業的封閉供應鏈與代工邏輯，與電子業截然不同。如果鴻海用傳統的代工思維去做電動車，很難突圍。",
m5_p2:"為此，鴻海在 2020 年發起了「MIH 電動車開放平台 (Mobility in Harmony)」。這是一個從「封閉代工」走向「開放生態系」的徹底轉型。鴻海試圖複製 Google Android 的成功模式：打造一個標準化的電動車底盤與軟體架構，開放給全球的軟硬體開發商與車廠使用。",
m5_p3:"MIH 的核心策略是創造「網路外部性 (Network Externalities)」與平台效應。當越來越多供應商加入 MIH 平台開發零組件（供給端），平台能提供的車型與技術就越豐富，進而吸引更多缺乏造車能力的新創品牌（如 Fisker, 甚至未來的 Apple）採用 MIH 平台（需求端）。這種跨邊網路效應 (Cross-side network effects) 將成為 MIH 的終極護城河。",
m5_p4:"從組織設計來看，這是一次經典的「結構性雙元 (Structural Ambidexterity)」。鴻海將傳統代工事業（利用 Exploitation：追求效率、控制成本）與 MIH 聯盟（探索 Exploration：開放創新、制定標準、軟體定義）在結構上分開。MIH 以獨立聯盟的形式運作，具備不同的文化與 KPI，並由高層（劉揚偉董事長）進行戰略整合，確保新事業不被傳統代工的效率邏輯所扼殺。",
m5_cards:[
  {title:"開放平台策略",desc:"打破傳統車廠（如 Toyota, VW）封閉且深不可測的垂直整合供應鏈。透過規格標準化與模組化，大幅降低造車門檻，讓任何科技公司都能跨足汽車領域。"},
  {title:"跨邊網路效應",desc:"MIH 的成功取決於兩邊群體的成長：硬體供應商/軟體開發者（供給面）與新創車企/品牌商（需求面）。兩者互相吸引，形成贏家通吃 (Winner-take-all) 的正向循環。"},
  {title:"模組化設計",desc:"與傳統車身一體化設計不同，MIH 採用高度模組化。這使得價值鏈發生「垂直解構」，品牌商可以像組裝電腦一樣，透過 MIH 平台自由選擇電池、馬達與自駕模組。"},
  {title:"結構性雙元組織",desc:"若把 MIH 交給傳統的代工事業群管理，封閉與保密的代工文化必然會毀掉開放平台的創新。將其設立為獨立聯盟，是保護探索型創新的必要組織設計。"}
],
m5_terms:[
  {front:"Platform Ecosystem\n平台生態系",back:"企業打造一個基礎架構，促進外部多方群體（如開發者、供應商、消費者）在該平台上進行互動與價值共創的商業模式。"},
  {front:"Network Externalities\n網路外部性",back:"當越來越多夥伴（供應商/車廠）加入 MIH 平台時，該平台對每一個參與者的價值會呈現指數型上升的現象。"},
  {front:"Structural Ambidexterity\n結構性雙元",back:"企業為了同時兼顧「現有事業的效率優化」與「未來事業的破壞性創新」，在組織結構上將兩者分離，各自採用不同管理邏輯的設計。"}
],
m5_q:[
  {q:"鴻海推出 MIH 開放平台，試圖在電動車產業複製哪一家科技巨頭的商業模式？",opts:["Apple 的封閉 iOS 系統","Google 的 Android 開放授權生態系","台積電的純晶圓代工模式","Walmart 的低價量販模式"],ans:1,exp:"MIH 就像電動車界的 Android，透過開源與標準化底盤架構，吸引全球零組件廠與品牌商加入，共同做大生態系。"},
  {q:"MIH 平台若要成功，最關鍵的經濟學原理護城河是什麼？",opts:["絕對的規模經濟","擁有最多實體工廠","跨邊網路效應 (Cross-side Network Effects) 帶來的正向循環","產品定價最昂貴"],ans:2,exp:"平台經濟的核心在於網路效應。當加入聯盟的供應商越多，平台的解決方案越好，就能吸引越多造車客戶，進一步吸引更多供應商加入，形成贏家通吃。"},
  {q:"就組織設計而言，鴻海讓 MIH 以獨立開放聯盟的形式運作，而非放在傳統代工事業群底下。這最符合哪一種管理概念？",opts:["垂直整合","非相關多角化","結構性雙元 (Structural Ambidexterity)","全面品質管理 (TQM)"],ans:2,exp:"將需要「開放探索」的 MIH 與需要「保密效率」的傳統代工在結構上隔離，各自擁有適合的文化與 KPI，是保護創新不被既有體制扼殺的經典做法。"},
  {q:"傳統汽車產業（如 Toyota）的供應鏈特性為何？MIH 試圖如何打破它？",opts:["傳統是高度開放；MIH 試圖封閉","傳統是高度封閉且深度的「關係型契約」(如 Keiretsu)；MIH 試圖透過「模組化與標準化介面」將其解構為開放市場","兩者完全相同","傳統沒有供應鏈；MIH 建立供應鏈"],ans:1,exp:"傳統車廠的零件多為深度客製化且高度互賴；MIH 透過模組化（如同 PC 產業），讓買家能輕易替換供應商組件，大幅降低造車門檻。"},
  {q:"企業同時進行「傳統代工業務的優化（利用 Exploitation）」與「MIH 開放生態系的建立（探索 Exploration）」。這種能力在策略管理上稱為？",opts:["核心僵固性","組織雙元性 (Organizational Ambidexterity)","經驗曲線","破壞性創新"],ans:1,exp:"組織雙元性就是企業能同時「用右手賺現在的錢（效率），用左手投資未來的機會（創新）」的高階動態能力。"}
],

m0_title:"Strategy Analysis of Foxconn Technology Group",
m0_intro:"Foxconn is the world's largest Electronic Manufacturing Services (EMS) provider. This module explores how a Taiwanese mold-maker conquered global supply chains through extreme 'Economies of Scale' and 'Vertical Integration (eCMMS)'; and how it navigates declining margins via the Sharp acquisition and the MIH EV open platform using structural ambidexterity.",
m0_why:"Why study Foxconn's Corporate Strategy?",
m0_why_desc:"Foxconn is the ultimate practical case of strategic management theory. It demonstrates how to extract value in the razor-thin 'Red Ocean of EMS' by building massive barriers to entry (managing a million-strong workforce, global logistics). Its current battles to defend gross margins and pivot to EVs are living examples of breaking core rigidities and rebuilding dynamic capabilities.",

  {num:"03",title:"Global Footprint & I-R Matrix",desc:"Supply chain shift, China Plus One, and Local Responsiveness"},

m1_nav:"1. Scale & EMS Empire",m1_title:"Rise of the EMS Empire & Economies of Scale",
m1_p1:"Foxconn's foundation is built on the classic 'Cost Leadership Strategy'. As an Electronic Manufacturing Service (EMS) provider, Foxconn does not own the final consumer brand (like Apple or HP) but focuses on the mid-chain manufacturing and assembly. By taking orders from global tech giants, Foxconn achieves an extreme 'Economies of Scale' impossible for a single brand to reach.",
m1_p2:"\"In contract manufacturing, scale is the moat. When you have the capacity and yield to assemble 500,000 iPhones a day, competitors simply cannot match your costs.\"",
m1_p3:"Massive scale brings dual advantages: (1) Extreme 'Bargaining Power' over upstream suppliers to secure raw materials at the lowest prices; (2) Massive fixed costs (automation, mold development) are amortized over a sea of production units, drastically lowering unit costs. This builds immense entry barriers.",
m1_p4:"Furthermore, Foxconn maximizes the 'Experience Curve'. Through continuous accumulated production, its engineers and management systems constantly optimize processes, reduce defects, and increase labor productivity (Learning by doing).",
m1_cards:[
  {title:"EMS (Electronic Manufacturing Services)",desc:"An industry providing outsourced design, manufacturing, testing, and logistics for brands. Foxconn is the undisputed global hegemon here."},
  {title:"Managing a Million-Strong Army",desc:"Foxconn's advantage isn't just machinery; it's the highly disciplined, efficient management of over a million grassroots workers and a complex global supply chain—a deeply 'tacit knowledge' hard to imitate."},
  {title:"The Trap of Scale Economies",desc:"When product demand reverses or a major client (like Apple) cuts orders, massive fixed assets and workforce instantly become a heavy burden, leading to plunging utilization rates and losses."},
  {title:"The Razor-Thin Margin Reality",desc:"In the 'Smiling Curve', manufacturing/assembly sits at the lowest-margin bottom. Foxconn chronically faces 3-4% gross margins, relying on a massive revenue base to sustain absolute profits."}
],
m1_terms:[
  {front:"Economies of Scale",back:"The cost advantage that arises with increased output of a product. Fixed costs are spread over more units, lowering per-unit production costs."},
  {front:"Experience Curve",back:"The phenomenon where unit value-added costs decline by a constant percentage as cumulative production volume doubles, driven by learning and process improvement."},
  {front:"Cost Leadership",back:"A strategy where a firm gains competitive advantage by achieving the lowest overall costs in its industry through rigorous cost controls and scale."}
],
m1_q:[
  {q:"What role does Foxconn primarily play in Apple's supply chain?",opts:["Core patent R&D developer","Fabless chip designer","EMS provider focused on terminal hardware assembly and manufacturing","Brand marketer for global sales"],ans:2,exp:"Foxconn is the world's largest Electronic Manufacturing Services (EMS) provider, assembling various components into final products."},
  {q:"Foxconn's ability to drive down raw material prices is due to which of Porter's Five Forces?",opts:["Low threat of new entrants","Extremely strong bargaining power of buyers (Foxconn over suppliers)","Low threat of substitutes","Weak rivalry among existing competitors"],ans:1,exp:"Because Foxconn procures in massive volumes, accounting for a huge chunk of suppliers' revenues, it wields absolute bargaining power over them."},
  {q:"What does the 'Experience Curve' mean for Foxconn?",opts:["Older employees get higher salaries","As cumulative production increases, unit production costs continuously decline through process optimization and skill proficiency","Relying only on advanced machines, not employee experience","Experience causes organizational rigidity"],ans:1,exp:"Contract manufacturers accumulate unmatched debugging and optimization experience through massive production volumes, creating a steep barrier for new entrants."},
  {q:"According to the 'Smiling Curve' theory, where does Foxconn's traditional EMS business sit?",opts:["Left end (R&D/Design, high value)","Right end (Brand/Marketing, high value)","The bottom (Manufacturing/Assembly, lowest value-added)","The absolute top"],ans:2,exp:"The Smiling Curve posits that R&D and Marketing are highly profitable, while mid-stream manufacturing yields razor-thin margins—prompting Foxconn's desire to transform."},
  {q:"Foxconn's highly efficient management of a million employees possesses which characteristic that makes imitation difficult?",opts:["Patent protection","Causal Ambiguity and Social Complexity","Government subsidies","Total automation"],ans:1,exp:"Managing a million-strong army involves extremely complex organizational culture, incentives, and tacit knowledge. Rivals cannot easily discern the true cause-and-effect of its success."}
],

m2_nav:"2. Vertical Integration",m2_title:"Vertical Integration & eCMMS Model",
m2_p1:"To squeeze more value out of razor-thin EMS margins, Foxconn doesn't just do 'final assembly'. Founder Terry Gou created the globally unique 'eCMMS' model (E-enabled Components, Modules, Moves and Services).",
m2_p2:"The core essence of eCMMS is extreme 'Backward Vertical Integration'. Foxconn doesn't just assemble phones for clients; it manufactures the casings, connectors, mechanical parts, and even PCBs itself.",
m2_p3:"From a 'Transaction Cost Economics (TCE)' perspective, Foxconn 'Internalizes (Makes)' components that would normally be procured from external suppliers. This yields three benefits: (1) Eliminates transaction costs (negotiation, info asymmetry) with external suppliers; (2) Completely controls component lead times and quality for ultimate 'one-stop shopping' speed; (3) Captures the component profit margins within the group, boosting overall profitability.",
m2_p4:"However, deep vertical integration brings the risk of 'Loss of Flexibility'. As tech cycles accelerate (e.g., metal casings shifting to glass), integrated firms chained to massive legacy production assets pivot much slower than 'Virtual Corporations' that outsource non-core operations.",
m2_cards:[
  {title:"eCMMS Model",desc:"Evolving from early OEM (pure assembly), Foxconn integrated Components, Modules, and Assembly/Services to provide clients with a highly efficient vertically integrated solution from design to logistics."},
  {title:"Synergy of Backward Integration",desc:"Apple only needs to interface with Foxconn, while Foxconn internally coordinates casings, connectors, and assembly. This drastically reduces Apple's 'market transaction costs' of sourcing and coordinating dozens of suppliers."},
  {title:"Hold-up Risk",desc:"Because contract manufacturers must invest in massive 'Transaction-specific assets' (custom molds, automated lines) for Apple, if Apple cuts orders or slashes fees, Foxconn faces severe hold-up and margin exploitation risks."},
  {title:"The Cost of Internalization",desc:"Internalizing too many stages can lead to organizational bloat. Internal supply divisions lose the 'high-powered incentives' of external market competition, potentially breeding bureaucratic inefficiency."}
],
m2_terms:[
  {front:"Backward Integration",back:"A firm extending its value chain upstream toward raw materials or components, internalizing the role of previous suppliers."},
  {front:"Transaction Cost Economics",back:"A theory of firm boundaries. When the friction costs of market exchange exceed the costs of internal administrative coordination, a firm chooses to internalize (vertically integrate) the activity."},
  {front:"Asset Specificity",back:"Investments tailored specifically for a particular client or transaction (like iPhone-specific assembly lines) that cannot be easily repurposed. The root of hold-up risk."}
],
m2_q:[
  {q:"Foxconn's eCMMS model is most accurately classified in strategic management as:",opts:["Unrelated diversification","High forward vertical integration","High backward vertical integration and one-stop service","A pure virtual corporation model"],ans:2,exp:"By extending backwards from assembly to produce its own upstream components like connectors and casings, Foxconn executes classic backward vertical integration."},
  {q:"According to TCE, why is Apple willing to let Foxconn handle most components and assembly?",opts:["Because Foxconn has the highest administrative costs","To drastically reduce Apple's 'Transaction Costs' of finding, negotiating, and coordinating numerous component suppliers in the market","Because Apple wants to be held-up","To increase carbon emissions"],ans:1,exp:"Foxconn's one-stop service internalizes market friction, saving the brand owner massive coordination and management costs."},
  {q:"Relying heavily on a single client (Apple >50% of revenue) and investing in massive dedicated lines exposes Foxconn to what risk?",opts:["Diseconomies of scale","Bargaining disadvantage driven by the Hold-up Problem","Exchange rate risk","Brand extension risk"],ans:1,exp:"After investing in highly 'specific assets', if the client threatens to shift orders, the manufacturer is forced to accept price cuts to avoid idle assets—classic hold-up extortion."},
  {q:"Which of the following is NOT a benefit of Foxconn's vertical integration?",opts:["Controlling key component lead times to boost response speed","Retaining component profit margins within the group","Enjoying absolute strategic flexibility to seamlessly switch to new tech suppliers at any time","Reducing the risk of being choked by external suppliers"],ans:2,exp:"Deep vertical integration locks capital into existing equipment, destroying 'strategic flexibility'. When tech shifts, the massive ship is hard to turn."},
  {q:"Compared to a 'Virtual Corporation' that outsources all manufacturing (like Apple), what is the greatest disadvantage of Foxconn's asset-heavy integrated model?",opts:["No brand awareness","The burden of massive fixed asset investments, leading to huge depreciation and losses during economic downturns","Inability to conduct R&D","No employees"],ans:1,exp:"Virtual firms shift capacity risk to contract manufacturers. Asset-heavy firms like Foxconn must maintain extremely high capacity utilization at all times just to stay profitable."}
],

m3_nav:"3. Global Footprint",m3_title:"Global Footprint & I-R Matrix",
m3_p1:"Foxconn's expansion history is the evolution of the global supply chain. Early on, Foxconn built massive bases in China (Shenzhen, Zhengzhou)—a classic 'Efficiency-seeking' internationalization motive. They leveraged China's abundant, cheap labor and land, combined with Taiwanese management, to create ultimate cost advantages.",
m3_p2:"However, due to geopolitical friction (US-China trade war) and rising Chinese labor costs, global supply chains are moving from 'long chains' to 'short chains' and 'fragmented chains'. Global brands now demand 'China Plus One' capabilities (backup capacity outside China).",
m3_p3:"Consequently, Foxconn accelerated capacity shifts to India, Vietnam, Mexico, and the US. In Bartlett & Ghoshal's 'I-R Framework' (Integration-Responsiveness), EMS traditionally employed a 'Global Strategy'—pursuing extreme global integration and scale economies. Now, to respond to government mandates ('Make in India/US') and tariffs, Foxconn is forced to increase 'Local Responsiveness'.",
m3_p4:"Managing cross-border factories faces immense 'CAGE Distance' challenges. Building plants in India or Wisconsin (US), Foxconn encounters massive Cultural distance (labor values, unions), Administrative distance (complex laws), and Economic distance (lack of mature component clusters). These 'Liabilities of Foreignness' severely test Foxconn's global operations capability.",
m3_cards:[
  {title:"Efficiency-seeking",desc:"Foxconn's early internationalization motive. Locating labor-intensive assembly in countries with 'Location advantages' (low wages, demographic dividends) to maximize global value chain cost-efficiency."},
  {title:"China Plus One Strategy",desc:"In response to US-China geopolitical risks and supply chain disruptions, MNCs no longer put all eggs in the China basket, mandating contract manufacturers to build alternative capacity in SE Asia or India."},
  {title:"Friction of CAGE Distance",desc:"Foxconn's rocky factory build in Wisconsin perfectly illustrates the cost of ignoring 'Administrative and Economic distances'—the US lacked Asia's highly concentrated component supply chains and engineers willing to work flexible overtime."},
  {title:"From Global to Transnational",desc:"Past goal: 'lowest global cost' (High Integration). Current goal: must also achieve 'local production and regulatory adaptation' (High Responsiveness). The complexity of managing this transnational matrix has skyrocketed."}
],
m3_terms:[
  {front:"Efficiency-seeking",back:"A motive for FDI where a firm seeks the lowest-cost or most productive locations globally to configure its value chain activities."},
  {front:"I-R Framework",back:"A model analyzing how MNCs balance the pressures of 'Global Integration (cost reduction)' and 'Local Responsiveness (adapting to local differences)'."},
  {front:"Liability of Foreignness",back:"The additional operational costs a firm incurs abroad—compared to local firms—due to unfamiliarity with local culture, laws, and lack of networks."}
],
m3_q:[
  {q:"What was the primary motive for Foxconn building massive early factories in Zhengzhou and Shenzhen, China?",opts:["Market-seeking (selling phones to Chinese citizens)","Efficiency-seeking (utilizing cheap labor/land to lower manufacturing costs)","Strategic asset-seeking (acquiring Chinese high-tech firms)","Resource-seeking (drilling for oil)"],ans:1,exp:"With razor-thin EMS margins, early expansion into China was entirely about securing low-cost factor location advantages—efficiency seeking."},
  {q:"Apple demanding Foxconn move some iPhone capacity to India and Vietnam reflects which pressure in global strategy?",opts:["Pursuit of more extreme global economies of scale","Pressure for 'Local Responsiveness' to address geopolitical risks, tariffs, and host-country regulations","To acquire advanced local R&D tech","To reduce shipping costs"],ans:1,exp:"Geopolitics demands supply chain Resilience. EMS firms are forced to abandon the ultimate cost-efficiency of a single mega-base, dispersing capacity to localize risk."},
  {q:"Foxconn's struggles with its Wisconsin (US) plant can best be explained by which Ghemawat framework concept?",opts:["Porter's Five Forces","BCG Matrix","CAGE Distance Framework (specifically Administrative and Economic/Infrastructure distance)","Smiling Curve"],ans:2,exp:"The US lacked complete electronic component clusters (Economic/Infrastructure distance) and had different labor laws/union cultures (Admin/Cultural distance), causing the Asian model to fail."},
  {q:"In the traditional 'I-R Framework', an industry like EMS with 'highly uniform global demand and extreme price competition' typically adopts which strategy?",opts:["Multidomestic Strategy","International Strategy","Global Strategy (pursuing extreme scale and standardization)","Arbitrage Strategy"],ans:2,exp:"EMS inherently requires High Global Integration (slashing costs) and Low Local Responsiveness (specs are globally unified by the brand), making it a textbook Global Strategy."},
  {q:"The rise of the 'China Plus One' strategy most directly damages which advantage firms previously relied upon?",opts:["Economies of Scope","Differentiation advantage","The extreme 'Economies of Scale and Clustering Effects' derived from over-concentrating in a single location","Brand equity"],ans:2,exp:"To disperse risk, firms must break up capacity previously concentrated in one mega-factory across multiple countries, inevitably sacrificing some economies of scale."}
],

m4_nav:"4. M&A Strategy",m4_title:"M&A Strategy: Seeking Strategic Assets via Sharp",
m4_p1:"When firms cannot break bottlenecks via internal Organic Growth, M&A becomes the fastest route to critical resources. Facing chronically compressed EMS margins (the curse of the Smiling Curve's bottom), Foxconn chose cross-border M&A to pursue 'Strategic Asset-seeking'.",
m4_p2:"In 2016, Foxconn acquired the century-old Japanese display maker Sharp for ~388.8 billion JPY. This was a classic fusion of 'Complementary Resources'. Foxconn possessed extreme manufacturing efficiency, deep capital, and massive Apple order channels; Sharp possessed top-tier IGZO display tech, rich patent portfolios, and a globally recognized consumer brand (intangible assets).",
m4_p3:"Through acquiring Sharp, Foxconn aimed for powerful 'Synergies': (1) Vertical Integration Synergy: incorporating Sharp's high-end displays into Foxconn's component supply chain, increasing self-sufficiency and gross margins for Apple orders; (2) Economies of Scope: using Foxconn's manufacturing might to lower Sharp's appliance costs, and leveraging Sharp's brand to help Foxconn step out of the EMS red ocean and touch the right end of the Smiling Curve ('Brand & Marketing').",
m4_p4:"However, 'Post-Merger Integration (PMI)' in cross-border M&A is notoriously difficult. The Taiwanese EMS culture of 'speed and cost control' clashed violently with the Japanese century-old culture of 'rigor and craftsmanship'. Foxconn adopted a PMI strategy between 'Symbiosis' and 'Absorption', dispatching Terry Gou's trusted lieutenant Tai Jeng-wu for iron-fisted restructuring, successfully turning Sharp profitable, though challenges in the display market persist.",
m4_cards:[
  {title:"Strategic Asset-seeking",desc:"Foxconn didn't buy Sharp for more assembly capacity. It bought it to acquire high-end display patents and a century-old brand reputation to strengthen its bargaining power in the value chain."},
  {title:"Crossing the Smiling Curve",desc:"Owning the Sharp brand gave Foxconn a weapon to face end-consumers directly, attempting to escape the low-margin fate of a pure contract manufacturer (the unsung hero) and earn brand premiums."},
  {title:"M&A Culture Clash (PMI)",desc:"M&As usually fail not from bad financial math, but incompatible cultures. Taiwanese hyper-agile culture vs Japanese stable lifetime-employment culture caused massive friction and pain during early integration."},
  {title:"Risk of the Winner's Curse",desc:"Foxconn fiercely outbid the Japanese government-backed fund (INCJ) for Sharp. Though it won, it assumed Sharp's massive hidden debts, facing the risk of paying an excessive premium."}
],
m4_terms:[
  {front:"Strategic Asset-seeking",back:"An M&A motive aimed at rapidly acquiring critical tech, patents, brands, or organizational capabilities the firm lacks, rather than merely expanding capacity."},
  {front:"Synergy",back:"The value created when two companies combine that exceeds the sum of their standalone values. Foxconn hoped Sharp Tech + Foxconn Mfg = 1+1>2."},
  {front:"Post-Merger Integration (PMI)",back:"The critical phase after an M&A deal closes where operations, systems, personnel, and cultures are actually fused to realize expected synergies."}
],
m4_q:[
  {q:"Foxconn's acquisition of Japan's Sharp aligns most closely with which internationalization motive?",opts:["Seeking cheap labor (Efficiency-seeking)","Seeking the massive Japanese consumer market","Seeking strategic assets (Acquiring top-tier display tech and brand IP)","To evade Taiwanese taxes"],ans:2,exp:"Sharp possesses IGZO display patents and a century-old brand—critical strategic assets Foxconn lacked and couldn't develop organically in the short term."},
  {q:"Foxconn installing Sharp's high-end displays into iPhones or TVs it assembles aims to achieve what kind of M&A synergy?",opts:["Horizontal scale economy synergy","Unrelated diversification synergy","Backward vertical integration synergy (controlling upstream key components to boost overall gross margins)","Financial arbitrage synergy"],ans:2,exp:"Displays are a highly expensive component. Controlling proprietary display tech allows Foxconn to capture more profit within the value chain—a vertical integration synergy."},
  {q:"Under the 'Smiling Curve' framework, what strategic significance did acquiring the Sharp 'brand' have for Foxconn?",opts:["It degraded Foxconn's assembly capabilities","It helped Foxconn extend from the low-margin bottom (EMS) to the highly profitable right end (Brand & Marketing)","It increased Foxconn's factory count in China","It had absolutely no significance"],ans:1,exp:"Brands earn a Premium. Owning the Sharp brand meant Foxconn was no longer just a behind-the-scenes manufacturer, allowing it to capture terminal market value directly."},
  {q:"In the Foxconn-Sharp M&A, what is typically the greatest 'Non-financial Challenge'?",opts:["The physical distance is too far","Severe incompatible organizational culture clashes (Taiwanese agile aggression vs Japanese rigorous stability)","Complete inability to communicate in any language","Strong government opposition"],ans:1,exp:"Up to 70% of PMI failures are attributed to culture clash. Different cultures lead to a breakdown of trust and the loss of core talent—the deadliest trap in cross-border M&A."},
  {q:"During the bidding for Sharp, Foxconn faced concerns about the 'Winner's Curse'. What risk does this refer to?",opts:["Winning pride but losing the competition","To defeat rivals (like INCJ), Foxconn may have paid an excessive premium, making the M&A cost exceed the synergy created, ultimately destroying shareholder value","The winner gets cursed by gods","Being ordered to shut down after winning"],ans:1,exp:"In fierce bidding, the winner is often overly optimistic and overpays. If the premium paid exceeds the '1+1>2' value generated, the deal is effectively a loss."}
],

m5_nav:"5. MIH & Ambidexterity",m5_title:"Transformation & Ambidexterity: MIH EV Platform",
m5_p1:"Facing saturation and stagnant growth in traditional consumer electronics (smartphones, PCs), Foxconn needed its next trillion-dollar Cash Cow. They locked onto Electric Vehicles (EV). However, the auto industry's closed supply chains and logic are vastly different from electronics. Foxconn couldn't break through using traditional EMS thinking.",
m5_p2:"Thus, in 2020, Foxconn launched the 'MIH (Mobility in Harmony) Open EV Platform'. This marked a radical transformation from 'closed EMS' to an 'open ecosystem'. Foxconn aims to replicate Google Android's success: building a standardized EV chassis and software architecture, open to global software/hardware developers and automakers.",
m5_p3:"MIH's core strategy relies on creating 'Network Externalities' and platform effects. As more suppliers join MIH to develop components (Supply side), the platform's tech offerings enrich, attracting more startups lacking car-making ability (like Fisker, or potentially Apple) to adopt the MIH platform (Demand side). These 'Cross-side network effects' form MIH's ultimate moat.",
m5_p4:"Organizationally, this is a classic execution of 'Structural Ambidexterity'. Foxconn structurally separated its traditional EMS business (Exploitation: pursuing efficiency, cost control) from the MIH alliance (Exploration: open innovation, standard-setting, software-defined). MIH operates as an independent alliance with different culture and KPIs, integrated strategically at the top by Chairman Young Liu, ensuring the new venture isn't suffocated by the traditional EMS efficiency logic.",
m5_cards:[
  {title:"Open Platform Strategy",desc:"Breaking the deeply closed, vertically integrated supply chains of traditional automakers (like Toyota, VW). Through standardization and modularity, MIH lowers the barrier to entry, letting any tech firm build cars."},
  {title:"Cross-side Network Effects",desc:"MIH's success depends on the growth of two groups: hardware/software suppliers (supply) and EV startups/brands (demand). They attract each other, creating a 'Winner-take-all' positive feedback loop."},
  {title:"Modular Design",desc:"Unlike traditional unibody car designs, MIH uses high modularity. This causes 'Vertical Disaggregation' in the value chain, allowing brands to assemble EVs like PCs, freely choosing batteries, motors, and self-driving modules."},
  {title:"Structural Ambidexterity",desc:"If MIH were managed by the traditional EMS business groups, the closed, secretive EMS culture would inevitably destroy the open platform's innovation. Establishing it as an independent alliance protects exploratory innovation."}
],
m5_terms:[
  {front:"Platform Ecosystem",back:"A business model where a firm builds foundational infrastructure enabling multiple external groups (developers, suppliers, consumers) to interact and co-create value."},
  {front:"Network Externalities",back:"The phenomenon where the value of the MIH platform to any single participant increases exponentially as more partners (suppliers/automakers) join the platform."},
  {front:"Structural Ambidexterity",back:"An organizational design where a firm separates 'efficiency optimization of current business' and 'disruptive innovation for future business' into distinct structural units with different management logics."}
],
m5_q:[
  {q:"By launching the MIH open platform, which tech giant's business model is Foxconn attempting to replicate in the EV industry?",opts:["Apple's closed iOS system","Google's open-licensing Android ecosystem","TSMC's pure-play foundry model","Walmart's low-price retail model"],ans:1,exp:"MIH acts like the Android of EVs. By open-sourcing a standardized chassis architecture, it attracts global component makers and brands to collectively grow the ecosystem."},
  {q:"For the MIH platform to succeed, what is its most critical economic moat?",opts:["Absolute economies of scale","Owning the most physical factories","The positive feedback loop generated by Cross-side Network Effects","Having the most expensive pricing"],ans:2,exp:"The core of platform economics is network effects. More suppliers make the platform better, attracting more automaker clients, which in turn attracts more suppliers—a winner-take-all dynamic."},
  {q:"Organizationally, Foxconn runs MIH as an independent open alliance rather than placing it under traditional EMS business groups. Which management concept does this best align with?",opts:["Vertical Integration","Unrelated Diversification","Structural Ambidexterity","Total Quality Management (TQM)"],ans:2,exp:"Structurally isolating the 'open exploration' of MIH from the 'secretive efficiency' of traditional EMS—allowing each to have tailored cultures and KPIs—is a classic method to protect innovation from being killed by the establishment."},
  {q:"What is a characteristic of traditional auto supply chains (like Toyota's), and how does MIH try to disrupt it?",opts:["Traditional is highly open; MIH tries to close it","Traditional relies on highly closed, deep 'Relational Contracts' (e.g., Keiretsu); MIH tries to disaggregate it into an open market via 'Modularity and Standard Interfaces'","They are exactly the same","Traditional has no supply chain; MIH builds one"],ans:1,exp:"Traditional auto parts are deeply customized and highly interdependent. MIH uses modularity (like the PC industry) so buyers can easily swap supplier components, slashing the barrier to building cars."},
  {q:"A firm simultaneously optimizing its traditional EMS business (Exploitation) while building the MIH open ecosystem (Exploration). In strategic management, this capability is called:",opts:["Core Rigidity","Organizational Ambidexterity","Experience Curve","Disruptive Innovation"],ans:1,exp:"Organizational Ambidexterity is the high-level dynamic capability of a firm to simultaneously 'make money today with efficiency (right hand)' while 'investing in tomorrow's opportunities through innovation (left hand)'."}
],

/* ═══════ MODULE QUIZ ═══════ */
const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit }) => {
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [quizIndices] = useState(() =>
    questions ? [...Array(questions.length).keys()].sort(() => Math.random() - 0.5).slice(0, 4) : []
  );
  
  if (!questions || questions.length === 0) return null;

  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 select-none">
      <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-6 flex items-center"><IconBookOpen size={20} className="mr-2"/>{t.quiz_title}</h3>
      {quizIndices.map((qIdx, i) => {
        const q = questions[qIdx];
        return (
          <div key={qIdx} className="mb-6">
            <p className="font-bold mb-3 text-slate-800 dark:text-slate-200">{i+1}. {q.q}</p>
            <div className="space-y-2">
              {q.opts.map((opt, oIdx) => (
                <button key={oIdx} onClick={() => !submitted && setSelected(s => ({...s, [i]: oIdx}))}
                  className={`w-full text-left px-4 py-3 rounded-lg border transition-all text-sm
                    ${submitted
                      ? oIdx === q.ans ? 'bg-green-100 border-green-500 dark:bg-green-900/30 dark:border-green-500 font-bold'
                        : selected[i] === oIdx ? 'bg-red-100 border-red-400 dark:bg-red-900/30 dark:border-red-400 text-red-600' : 'border-slate-200 dark:border-slate-700'
                      : selected[i] === oIdx ? 'border-[#004030] dark:border-[#D8C3A5] bg-[#004030]/5 dark:bg-[#D8C3A5]/5 font-bold text-[#004030] dark:text-[#D8C3A5]' : 'border-slate-200 dark:border-slate-700 hover:border-slate-400'
                    } text-slate-700 dark:text-slate-300`}>
                  {opt}
                </button>
              ))}
            </div>
            {submitted && <p className="mt-2 text-sm text-slate-600 dark:text-slate-400 italic">{t.explanation}: {q.exp}</p>}
          </div>
        );
      })}
      {!submitted ? (
        <button onClick={() => { 
            setSubmitted(true); 
            const c = quizIndices.filter((qIdx,i) => selected[i] === questions[qIdx].ans).length; 
            onQuizSubmit(moduleId, c, quizIndices.length, questions.length); 
          }}
          disabled={Object.keys(selected).length < quizIndices.length}
          className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 transition-all">
          {t.submit}
        </button>
      ) : (
        <div className="flex items-center gap-4">
          <p className="font-bold text-[#004030] dark:text-[#D8C3A5]">{t.score}: {quizIndices.filter((qIdx,i) => selected[i] === questions[qIdx].ans).length}/{quizIndices.length}</p>
          <button onClick={() => { setSelected({}); setSubmitted(false); }}
            className="px-6 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-lg hover:bg-[#004030]/10 transition-colors">
            {t.retry}
          </button>
        </div>
      )}
    </div>
  );
};
